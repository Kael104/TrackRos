name: Dependency audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly Monday 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test
